services:
  frontend:
    build:
      context: .
      args:
        # Build-time environment variables for Next.js
        NEXT_PUBLIC_API_URL: ${DOCKER_API_URL:-http://host.docker.internal:3086}
    container_name: my-hrm-fe
    restart: always
    ports:
      - "3200:3000"
    environment:
      # Runtime environment variables if needed
      NEXT_PUBLIC_API_URL: ${DOCKER_API_URL:-http://host.docker.internal:3086}
      PORT: 3000
    extra_hosts:
      - "host.docker.internal:host-gateway"
